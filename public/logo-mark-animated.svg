<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Prompt Expert">
  <title>Prompt Expert</title>
  <style>
    /* Single calm "cursor settle": one slow blink on load, then rest solid. */
    .pe-cursor {
      animation: pe-cursor-settle 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.25s 1 both;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes pe-cursor-settle {
      0%   { opacity: 0; transform: scale(0.55); }
      28%  { opacity: 1; transform: scale(1); }
      62%  { opacity: 1; }
      74%  { opacity: 0.16; }
      88%  { opacity: 1; }
      100% { opacity: 1; transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pe-cursor { animation: none; opacity: 1; }
    }
  </style>
  <rect width="64" height="64" rx="14" fill="#101216"/>
  <rect x="0.6" y="0.6" width="62.8" height="62.8" rx="13.4" fill="none" stroke="#F2F4F5" stroke-opacity="0.07"/>
  <path fill-rule="evenodd" clip-rule="evenodd" fill="#F2F4F5"
        d="M17 14 Q17 13 18 13 L36 13 A12 12 0 0 1 36 37 L26 37 L26 48 Q26 49 25 49 L18 49 Q17 49 17 48 Z M26 20 L35 20 A5 5 0 0 1 35 30 L26 30 Z"/>
  <rect class="pe-cursor" x="29.5" y="22" width="5" height="6" rx="1.3" fill="#B1EF4A"/>
</svg>
