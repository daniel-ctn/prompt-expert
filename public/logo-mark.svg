<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Prompt Expert">
  <title>Prompt Expert</title>
  <!-- Instrument tile -->
  <rect width="64" height="64" rx="14" fill="#101216"/>
  <!-- Hairline instrument edge (vanishes at favicon size) -->
  <rect x="0.6" y="0.6" width="62.8" height="62.8" rx="13.4" fill="none" stroke="#F2F4F5" stroke-opacity="0.07"/>
  <!-- Aperture "P": stem + bowl with a windowed counter -->
  <path fill-rule="evenodd" clip-rule="evenodd" fill="#F2F4F5"
        d="M17 14 Q17 13 18 13 L36 13 A12 12 0 0 1 36 37 L26 37 L26 48 Q26 49 25 49 L18 49 Q17 49 17 48 Z M26 20 L35 20 A5 5 0 0 1 35 30 L26 30 Z"/>
  <!-- Signal: the block cursor seated in the prompt window -->
  <rect x="29.5" y="22" width="5" height="6" rx="1.3" fill="#B1EF4A"/>
</svg>
